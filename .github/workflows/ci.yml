name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        optional-deps:
          - full
          - none

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "29"
          elixir-version: "1.20"

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-mix-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Verify full dependency set
        if: matrix.optional-deps == 'full'
        run: mix verify

      - name: Verify without optional dependencies
        if: matrix.optional-deps == 'none'
        run: |
          mix format --check-formatted
          mix compile --no-optional-deps --warnings-as-errors
          mix test --no-compile

      - name: Schema coverage
        if: matrix.optional-deps == 'full'
        run: mix oxide_api.schema
